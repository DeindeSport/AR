<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Producto en AR</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

</head>

<head>
<style>
#ar-button{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:14px 24px;
border-radius:8px;
}
</style>
</head>

<model-viewer
src="modelo.glb"
ios-src="modelo.usdz"
poster="preview.jpg"
ar
ar-modes="scene-viewer quick-look webxr"
camera-controls
auto-rotate
environment-image="neutral"
shadow-intensity="1">
</model-viewer>

</body>
</html>
